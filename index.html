<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Results summary component</title>
    <link
      rel="shortcut icon"
      href="assets/images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <section class="section-one">
        <h1>Your Result</h1>
        <div>
          <p><span>76</span>of 100</p>
        </div>
        <h2>Great</h2>
        <p class="description">
          You scored higher than 65% of the people who have taken these tests.
        </p>
      </section>
      <section class="section-two">
        <h3>Summary</h3>
        <div class="red">
          <h4><img src="assets/images/icon-reaction.svg" alt="" /> Reaction</h4>
          <p><strong>80</strong> / 100</p>
        </div>
        <div class="yellow">
          <h4><img src="assets/images/icon-memory.svg" alt="" /> Memory</h4>
          <p><strong>92</strong> / 100</p>
        </div>
        <div class="green">
          <h4><img src="assets/images/icon-verbal.svg" alt="" /> Verbal</h4>
          <p><strong>61</strong> / 100</p>
        </div>
        <div class="blue">
          <h4><img src="assets/images/icon-visual.svg" alt="" /> Visual</h4>
          <p><strong>72</strong> / 100</p>
        </div>
        <button>Continue</button>
      </section>
    </main>
  </body>
</html>
